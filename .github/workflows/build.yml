name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore: ['*.md']
  schedule:
    # Re-build every Monday 03:00 UTC to catch upstream CloudStream API changes.
    - cron: "0 3 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
        # Se la branch "builds" non esiste ancora, questo step fallisce —
        # va creato una volta sola a mano (vedi README, sezione "builds branch").

      - name: Clean old builds
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm -f $GITHUB_WORKSPACE/builds/*.jar  || true
          rm -f $GITHUB_WORKSPACE/builds/plugins.json || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.12
        # Usa Gradle direttamente dal setup-gradle action — non dipende
        # dal gradlew script nel repo (che non è stato committato).
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12"

      - name: Generate Gradle Wrapper
        # Genera gradlew + gradlew.bat + gradle/wrapper/gradle-wrapper.jar
        # dentro il checkout, così le build locali di chi fa clone funzionano.
        run: |
          cd $GITHUB_WORKSPACE/src
          gradle wrapper --gradle-version 8.12 --distribution-type bin

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          ./gradlew ensureJarCompatibility || true

      - name: Copy artifacts
        run: |
          cp $GITHUB_WORKSPACE/src/**/build/*.cs3 $GITHUB_WORKSPACE/builds/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/src/**/build/*.jar  $GITHUB_WORKSPACE/builds/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/src/build/plugins.json $GITHUB_WORKSPACE/builds/

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
