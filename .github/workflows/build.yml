name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore: ['*.md']
  schedule:
    # Re-build every Monday 03:00 UTC to catch upstream CloudStream API changes.
    - cron: "0 3 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true
          rm -f $GITHUB_WORKSPACE/builds/*.jar  || true
          rm -f $GITHUB_WORKSPACE/builds/plugins.json || true

      # AGP 9.x requires JDK 17 minimum, but JDK 21 is the safer pick because
      # Kotlin 2.3.x targets JVM 21 by default.
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson --no-daemon
          ./gradlew ensureJarCompatibility --no-daemon || true

      - name: Copy artifacts
        run: |
          cp $GITHUB_WORKSPACE/src/**/build/*.cs3 $GITHUB_WORKSPACE/builds/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/src/**/build/*.jar  $GITHUB_WORKSPACE/builds/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/src/build/plugins.json $GITHUB_WORKSPACE/builds/

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
